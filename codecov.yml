codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 85%
        if_ci_failed: error
    patch:
      default:
        informational: true
        if_ci_failed: error

ignore:
  - "src/excelalchemy/types/**"
  - "src/excelalchemy/exc.py"
  - "src/excelalchemy/identity.py"
  - "src/excelalchemy/header_models.py"

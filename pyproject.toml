[build-system]
requires = ['flit_core >=3.2,<4']
build-backend = 'flit_core.buildapi'

[project]
name = 'ExcelAlchemy'
authors = [{ name = '何睿', email = 'hrui835@gmail.com' }]
readme = 'README.md'
license = { file = 'LICENSE' }
classifiers = ['License :: OSI Approved :: MIT License']
dynamic = ['version', 'description']
requires-python = '>=3.10'
dependencies = [
    'pandas >=2.0.0, <3',
    'minio >=7.0.0, <8',
    'pydantic[email] >=1.9, <2',
    'openpyxl >=3.0.10, <4',
    'pendulum >=2.1.2, <4',
]

[tool.flit.module]
name = 'excelalchemy'

[project.urls]
Home = 'https://github.com/SundayWindy/excelalchemy'

[project.optional-dependencies]
development = [
    'pandas-stubs',
    'mypy',
    'nox',
    'pylint',
    'pre-commit',
    'pyright==1.1.299',
    'pytest',
    'coverage',
    'pytest-cov',
    'ruff',
]

[tool.pyright]
exclude = [
    '.venv',
    'venv',
    '.git',
    '**/.mypy_cache',
    '**/__pycache__',
    '**/.pytest_cache',
]
ignore = ['pandas']
enableTypeIgnoreComments = false
reportUnusedFunction = false
typeCheckingMode = 'strict'
reportUnusedImport = false
reportMissingTypeStubs = false
reportUnknownVariableType = false


extension-pkg-whitelist = ['pydantic', 'pendulum']

[tool.pylint.basic]
attr-rgx = '^[_a-z][a-z0-9_]*$'        # snake_case
variable-rgx = '^[_a-z][a-z0-9_]*$'    # snake_case
argument-rgx = '^[_a-z][a-z0-9_]*$'    # snake_case
class-rgx = '^(_?[A-Z][a-zA-Z0-9]*)*$'
method-rgx = '^[_a-z][a-z0-9_]*$'      # snake_case


[tool.pylint.'MESSAGES CONTROL']
disable = [
    'missing-module-docstring',
    'missing-function-docstring',
    'missing-class-docstring',
    'too-many-instance-attributes',
    'too-many-arguments',
    'too-many-positional-arguments',
    'too-few-public-methods',
    'too-many-public-methods',
    'no-else-return',
    'no-else-raise',
    'fixme',
    'duplicate-code',
    'redefined-builtin',
    'broad-except',
    'abstract-class-instantiated',
    'invalid-name',
]


[tool.pylint.'MASTER']
jobs = 4
score = false
ignore-paths = [
    '.git/',
    'venv/',
    '.venv/',
    '.mypy_cache/',
    '__pycache__/',
    '.pytest_cache/',
    'tests/',
    'dist/',
]
extension-pkg-whitelist = [
    'pydantic',
    'pandas',
    'pendulum',

]


[tool.ruff]
line-length = 120
target-version = 'py310'
src = ['excelalchemy', 'tests']
extend-exclude = ['files']

[tool.ruff.lint]
select = ['E', 'F', 'I']
ignore = ['E501']

[tool.ruff.lint.per-file-ignores]
'**/__init__.py' = ['F401']

[tool.ruff.format]
quote-style = 'preserve'
indent-style = 'space'
line-ending = 'auto'

[tool.pylint.'FORMAT']
max-line-length = 120

[tool.mypy]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ['tests']

[tool.coverage.run]
branch = true
source = ['excelalchemy']

[tool.coverage.report]
skip_covered = true
show_missing = true

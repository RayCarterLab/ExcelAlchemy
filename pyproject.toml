[build-system]
requires = ['flit_core >=3.2,<4']
build-backend = 'flit_core.buildapi'

[project]
name = 'ExcelAlchemy'
authors = [{ name = '何睿', email = 'hrui835@gmail.com' }]
readme = 'README.md'
license = { file = 'LICENSE' }
classifiers = ['License :: OSI Approved :: MIT License']
dynamic = ['version', 'description']
requires-python = '>=3.10'
dependencies = [
    'pandas >=2.0.0, <3',
    'minio >=7.0.0, <8',
    'pydantic[email] >=1.9, <2',
    'openpyxl >=3.0.10, <4',
    'pendulum >=2.1.2, <4',
]

[tool.flit.module]
name = 'excelalchemy'

[project.urls]
Home = 'https://github.com/RayCarterLab/ExcelAlchemy'

[project.optional-dependencies]
development = [
    'build',
    'pandas-stubs',
    'nox',
    'pre-commit',
    'pyright==1.1.299',
    'pytest',
    'coverage',
    'pytest-cov',
    'ruff',
]

[tool.pyright]
include = ['excelalchemy', 'tests']
exclude = [
    '.venv',
    'venv',
    '.git',
    '**/.mypy_cache',
    '**/__pycache__',
    '**/.pytest_cache',
    'excelalchemy/types/field.py',
]
ignore = ['pandas']
enableTypeIgnoreComments = false
reportAbstractUsage = false
reportArgumentType = false
reportAssignmentType = false
reportAttributeAccessIssue = false
reportCallIssue = false
reportDeprecated = false
reportGeneralTypeIssues = false
reportMissingTypeArgument = false
reportMissingTypeStubs = false
reportPrivateImportUsage = false
reportUnknownArgumentType = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownVariableType = false
reportUnusedFunction = false
reportUnusedImport = false
typeCheckingMode = 'basic'

[tool.ruff]
line-length = 120
target-version = 'py310'
src = ['excelalchemy', 'tests']
extend-exclude = ['files']

[tool.ruff.lint]
select = ['E', 'F', 'I']
ignore = ['E501']

[tool.ruff.lint.per-file-ignores]
'**/__init__.py' = ['F401']

[tool.ruff.format]
quote-style = 'preserve'
indent-style = 'space'
line-ending = 'auto'

[tool.pytest.ini_options]
testpaths = ['tests']

[tool.coverage.run]
branch = true
source = ['excelalchemy']

[tool.coverage.report]
skip_covered = true
show_missing = true

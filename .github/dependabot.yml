version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci(deps)'
    groups:
      github-actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'github-actions'

  - package-ecosystem: 'pip'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:15'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'build(deps)'
    groups:
      python-production:
        dependency-type: 'production'
        patterns:
          - '*'
      python-development:
        dependency-type: 'development'
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'python'

  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(pre-commit)'
    groups:
      pre-commit-hooks:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'pre-commit'

name: Bug report
description: Report a reproducible problem in ExcelAlchemy
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for us to reproduce the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, sample code, or test data needed to reproduce the issue.
      placeholder: |
        1. Create model ...
        2. Call ...
        3. Observe ...
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ExcelAlchemy version
      placeholder: 1.1.0
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.10"
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, dependency versions, storage backend details, or anything else that may matter.
